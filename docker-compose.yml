version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "42066:42066"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - auth

  auth:
    build: .
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PROXY_URL=${PROXY_URL}
